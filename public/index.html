<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Connexion</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="flex items-center justify-center h-screen bg-indigo-100">

                <table class="h-[100%]">
                    <tr>
                        <td class="p-[10px]">
                            <label for="mat">Matricule :</label>
                        </td>
                        <td>
                            <input type="text" name="mat" id="mat" required>
                        </td>
                    </tr>
                    <tr>
                        <td class="p-[10px]">
                            <label for="pw">Mot de Passe : </label>
                        </td>
                        <td>
                            <input type="password" name="pw" id="pw" required>
                        </td>
                    </tr>
                    <tr class="text-white">
                        <td colspan="2" class="p-[10px] text-center">
                            <input type="submit" value="Connexion"name="login" id="login" class=" w-full bg-green-300 outline outline-green-300 hover:bg-green-500 hover:outline-green-500">
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2" class="p-[10px] text-center">
                            Mot de passe oublié ? Cliquez <a href=""class="text-blue-500 underline">ici</a>
                        </td>
                    </tr>
                </table>
            </form>
        </div>
    </body>
</html>
